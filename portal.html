<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Work Permit Portal</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#23395d;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#17263f;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Portal Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){
window.location.href="portal.html";
}
else{
alert("Invalid Login");
}

}

</script>

</body>
</html>
