<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Work Permit & eVisa Status Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f1f5f9;
margin:0;
}

header{
background:#23395d;
color:white;
padding:20px 40px;
font-size:20px;
}
.site-footer{
display:flex;
align-items:center;
gap:20px;
padding:30px 40px;
background:#f5f5f5;
margin-top:80px;
}

.footer-logo{
height:80px;
}

.footer-text h3{
margin:0;
color:#2c3e50;
font-size:24px;
}

.footer-text p{
margin:5px 0;
}

.small{
font-size:12px;
color:#666;
}
.container{
max-width:700px;
margin:80px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
margin-top:25px;
background:#23395d;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#17263f;
}

.result-card{
margin-top:30px;
padding:20px;
border-radius:8px;
background:#f8fafc;
border:1px solid #e5e7eb;
}

.valid{
color:green;
font-weight:600;
}

.invalid{
color:red;
font-weight:600;
}

footer{
margin-top:80px;
padding:30px;
text-align:center;
font-size:12px;
color:#555;
}

</style>

</head>
<footer class="site-footer">

  <div class="footer-left">
      <img src="footer-logo.png" class="footer-logo">
  </div>

  <div class="footer-text">
      <h3>welcometoserbia.gov.rs</h3>
      <p>Welcome to Serbia</p>
      <p class="small">
      The website is licensed under a Creative Commons Attribution license.
      </p>
  </div>

</footer>
<body>

<header class="header">
  <img src="logo.png" class="logo">
  <div class="title">Work Permit & eVisa Verification Portal</div>
</header>

<div class="container">

<h2>Check Work-Permit & eVisa Status</h2>

<label>Passport Number *</label>
<input type="text" id="passport" placeholder="Enter passport number">

<label>Date of Birth *</label>
<input type="date" id="dob">

<button onclick="checkPermit()">Check Status</button>

<div id="result"></div>

</div>

<footer>
Work-Permit & eVisa Status System Serbia.gov.rs
</footer>

<script src="script.js"></script>

</body>
</html>
